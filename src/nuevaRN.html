  <body>
    <div class="container-fluid">
      <nav>
        <div class="nav-izquierda">
          <button class="btn btn-atras"><i class="bi bi-arrow-return-left"></i></button>
          
         
        </div>
        <div class="nav-derecha">
          <button class="btn btn-usuario">
            <i class="bi bi-person-fill"></i>
          </button>
          <button class="btn btn-salir">
            Salir
          </button>
        </div>
      </nav>

      <div class="bodyPart">
          <h1>Nueva</h1>
          <h2>Reunión Científica Nacional</h2>
           <!-- Formulario -->
          <form>
            <label for="nombre">Nombre</label>
              <input type="text" id="nombre" name="nombre" required>

              <label for="ciudad">Ciudad</label>
              <input type="text" id="ciudad" name="ciudad" required>

              <label for="expositor">Expositor</label>
              <input type="text" id="expositor" name="expositor" required>

              <label for="titulo">Título del Trabajo</label>
              <input type="text" id="titulo" name="titulo" required>

              <label for="autores">Autores:</label>
              <div class="additional-authors">
                <label for="author">Autor </label>
                <input type="text" id="author" name="author">

                <!-- Botón para agregar más autores -->
                <button type="button" class="add-author-btn" onclick="addAuthorField()">Agregar Autor</button>
                
                <!-- Botón para eliminar la última casilla de autor -->
                <button type="button" class="remove-author-btn" onclick="removeAuthorField()">Eliminar Autor</button>

              </div>


              <label for="fecha">Fecha</label>
              <input type="date" id="fecha" name="fecha" required>

              <!-- Botones de enviar y cancelar -->
              <div style="display: flex; justify-content: space-between; width: 100%;">
                <button type="button" class="cancel-btn" onclick="cancelForm()">Cancelar</button>
                <button type="submit" class="submit-btn" onclick="handleSubmit()">Enviar</button>
              </div>
          </form>
          <script>
            function addAuthorField() {
                const additionalAuthorsContainer = document.querySelector('.additional-authors');
                const newAuthorInput = document.createElement('input');
                newAuthorInput.type = 'text';
                newAuthorInput.name = `author${additionalAuthorsContainer.childElementCount + 2}`;
                newAuthorInput.placeholder = `Autor ${additionalAuthorsContainer.childElementCount + 2}`;
                additionalAuthorsContainer.appendChild(newAuthorInput);
            }
        </script>    <script>
          function addAuthorField() {
              const additionalAuthorsContainer = document.querySelector('.additional-authors');
              const newAuthorInput = document.createElement('input');
              newAuthorInput.type = 'text';
              newAuthorInput.name = `author${additionalAuthorsContainer.childElementCount + 2}`;
              newAuthorInput.placeholder = `Autor ${additionalAuthorsContainer.childElementCount + 2}`;
              additionalAuthorsContainer.appendChild(newAuthorInput);
          }
          function removeAuthorField() {
            const additionalAuthorsContainer = document.getElementById('authorsContainer');
            if (additionalAuthorsContainer.childElementCount > 1) {
                additionalAuthorsContainer.removeChild(additionalAuthorsContainer.lastElementChild);
            }
        }
          function cancelForm() {
            alert('Formulario cancelado');
            // Puedes agregar aquí cualquier acción adicional que desees realizar al cancelar el formulario
        }
        function handleSubmit() {
          // Puedes agregar aquí la lógica para enviar el formulario

          // Muestra el mensaje de éxito
          const successMessage = document.getElementById('Reunion Cientifica Nacional agregada exitosamente');
          successMessage.style.display = 'block';

          // Devuelve false para evitar que el formulario se envíe realmente (porque no tenemos una acción de formulario real)
          return false;
      }
    </script>
